<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Punny Side Up — Business Names That Make You Groan</title>
  <meta name="description" content="Generate punny business names in seconds. Type a business type, get a name that makes people groan and grin." />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yolk:     #f5c842;
      --yolk-deep:#c9991a;
      --shell:    #fdf6e3;
      --white-egg:#fffdf7;
      --mint:     #d4ede4;
      --blush:    #f2ddd8;
      --sky:      #d5e8f5;
      --lavender: #e4ddf5;
      --ink:      #2e2a24;
      --ink-mid:  #7a726a;
      --ink-soft: #b5ada4;
      --radius:   16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--shell);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem 3rem;
      color: var(--ink);
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.5rem;
    }

    .egg {
      width: 38px;
      height: 44px;
    }

    header h1 {
      font-family: 'Lora', serif;
      font-size: 2.6rem;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    header h1 span {
      color: var(--yolk-deep);
    }

    header p {
      margin-top: 0.5rem;
      font-size: 0.95rem;
      color: var(--ink-mid);
    }

    /* ── Card ── */
    .card {
      background: var(--white-egg);
      border-radius: 24px;
      padding: 2rem;
      width: 100%;
      max-width: 500px;
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 4px 24px rgba(0,0,0,0.05);
    }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-mid);
      margin-bottom: 7px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.7rem 1rem;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      border: 1.5px solid rgba(0,0,0,0.1);
      border-radius: var(--radius);
      background: var(--shell);
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]::placeholder { color: var(--ink-soft); }

    input[type="text"]:focus {
      border-color: var(--yolk);
      box-shadow: 0 0 0 3px rgba(245,200,66,0.2);
    }

    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.7rem 1.3rem;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      background: var(--yolk);
      color: var(--ink);
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
    }

    .btn:hover:not(:disabled) { background: #f0be2a; }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Output ── */
    .output-wrap {
      margin-top: 1.25rem;
    }

    .output-box {
      min-height: 96px;
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
      gap: 4px;
      transition: background 0.4s;
      background: var(--mint);
    }

    .output-box.c-blush    { background: var(--blush); }
    .output-box.c-sky      { background: var(--sky); }
    .output-box.c-lavender { background: var(--lavender); }
    .output-box.c-mint     { background: var(--mint); }

    .biz-name {
      font-family: 'Lora', serif;
      font-size: 2rem;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.25;
    }

    .biz-type {
      font-size: 0.78rem;
      color: var(--ink-mid);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .placeholder {
      font-size: 0.9rem;
      color: var(--ink-soft);
      font-style: italic;
    }

    .spinner {
      width: 22px; height: 22px;
      border: 2px solid rgba(0,0,0,0.1);
      border-top-color: var(--yolk-deep);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      font-size: 0.82rem;
      color: #b04040;
      margin-top: 8px;
      text-align: center;
      display: none;
    }

    /* ── History ── */
    .history {
      margin-top: 1.5rem;
      display: none;
    }

    .history-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      font-family: 'Lora', serif;
      font-size: 0.85rem;
      padding: 5px 13px;
      border-radius: 20px;
      background: var(--shell);
      color: var(--ink);
      border: 1px solid rgba(0,0,0,0.08);
      cursor: default;
    }

    /* ── Footer ── */
    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--ink-soft);
      text-align: center;
    }

    /* ── Mobile ── */
    @media (max-width: 460px) {
      header h1 { font-size: 2rem; }
      .card { padding: 1.5rem; }
      .biz-name { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg class="egg" viewBox="0 0 38 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="19" cy="25" rx="17" ry="18" fill="#fffdf7" stroke="#e8d98a" stroke-width="1.5"/>
      <ellipse cx="19" cy="26" rx="8" ry="8" fill="#f5c842" opacity="0.9"/>
    </svg>
    <h1>Punny <span>Side Up</span></h1>
  </div>
  <p>Type a business. Get a name that makes people groan.</p>
</header>

<div class="card">
  <label for="topic">Type of business</label>
  <div class="input-row">
    <input
      type="text"
      id="topic"
      placeholder="e.g. gluten-free bakery, dog groomer…"
      maxlength="80"
      autocomplete="off"
    />
    <button class="btn" onclick="generate()" id="gen-btn">Name it</button>
  </div>

  <div class="output-wrap">
    <div class="output-box c-mint" id="output">
      <span class="placeholder">Your punny name will appear here</span>
    </div>
    <div class="error-msg" id="error-msg">Something went wrong. Try again.</div>
  </div>

  <div class="history" id="history">
    <div class="history-label">Previous names</div>
    <div class="pills" id="pills"></div>
  </div>
</div>

<footer>Made with groan-worthy love &nbsp;·&nbsp; Powered by Claude</footer>

<script>
  const colors = ['c-mint', 'c-blush', 'c-sky', 'c-lavender'];
  let colorIdx = 0;
  let history = [];

  document.getElementById('topic').addEventListener('keydown', e => {
    if (e.key === 'Enter') generate();
  });

  async function generate() {
    const topic = document.getElementById('topic').value.trim();
    if (!topic) { document.getElementById('topic').focus(); return; }

    const out    = document.getElementById('output');
    const btn    = document.getElementById('gen-btn');
    const errEl  = document.getElementById('error-msg');

    errEl.style.display = 'none';
    out.className = 'output-box ' + colors[colorIdx % colors.length];
    out.innerHTML = '<div class="spinner"></div>';
    btn.disabled = true;

    try {
      const res  = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic })
      });

      const data = await res.json();

      if (!res.ok || !data.name) {
        throw new Error(data.error || 'No name returned');
      }

      out.innerHTML = `
        <div class="biz-name">${data.name}</div>
        <div class="biz-type">${topic}</div>
      `;

      colorIdx++;
      history.unshift({ topic, name: data.name });
      if (history.length > 8) history.pop();
      renderHistory();

    } catch (err) {
      out.innerHTML = '<span class="placeholder">Couldn\'t crack that one. Try again.</span>';
      errEl.textContent = err.message || 'Something went wrong.';
      errEl.style.display = 'block';
    }

    btn.disabled = false;
  }

  function renderHistory() {
    const prev = history.slice(1);
    const histEl = document.getElementById('history');
    if (prev.length === 0) { histEl.style.display = 'none'; return; }
    histEl.style.display = 'block';
    document.getElementById('pills').innerHTML =
      prev.map(h => `<span class="pill" title="${h.topic}">${h.name}</span>`).join('');
  }
</script>
</body>
</html>
